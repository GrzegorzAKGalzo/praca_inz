<form (submit)="addCar()">
  <h2>{{typeForm}}</h2>
  <div class="form-group" *ngIf="typeForm != 'Modyfikacja'">
    <label for="client">Klient </label>
    <select id="client" name="client" [(ngModel)]="car.client" >
      <option *ngFor="let client of clients" [value]="client.id">{{ client.name + " " + client.lastname }}</option>
    </select>
  </div>

  <div class="form-group" >
    <label for="mark">Marka </label>
    <input type="text" name="mark" id="mark" [(ngModel)]="car.mark">
  </div>
  <div class="form-group" >
    <label for="model">Model </label>
    <input type="text" name="model" id="model" [(ngModel)]="car.model">
  </div>
  <div class="form-group" >
    <label for="reg">Rejestracja </label>
    <input type="text" name="reg" id="reg" [(ngModel)]="car.reg">
  </div>
  <div class="form-group" >
    <label for="year">Rok </label>
    <input type="text" name="year" id="year" [(ngModel)]="car.year">
  </div>


  <div class="form-group">
    <input type="submit" value="Dodaj" />

  </div>
</form>
