<form (submit)="addUser()">
  <h2>{{typeForm}}</h2>


  <div class="form-group">
    <label for="username">Nazwa </label>
    <input type="text" name="username" id="username" [(ngModel)]="user.username">
  </div>
  <div class="form-group" *ngIf="typeForm != 'Modyfikacja'">
    <label for="password">Hasło </label>
    <input type="password" name="password" id="password" [(ngModel)]="user.password">
  </div>
  <div class="form-group" >
    <label for="email">Email </label>
    <input type="text" name="email" id="email" [(ngModel)]="user.email">
  </div>
  <div class="form-group">
    <label for="roles">Rola </label>
    <select name="roles" id="roles" [(ngModel)]="user.roles">
      <option value="administator">Administator</option>
      <option value="mechanik">Mechanik</option>
    </select>
  </div>


  <div class="form-group">
    <input type="submit" value="Dodaj" />

  </div>
</form>
